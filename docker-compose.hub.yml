# Dùng file này nếu bạn muốn dùng image có sẵn từ Docker Hub
# thay vì build từ source code.
#
# Cách dùng:
#   1. Tải file này và .env.example về cùng thư mục
#   2. Sao chép .env.example thành .env và điền thông tin
#   3. docker compose -f docker-compose.hub.yml up -d

services:
  app:
    image: buitanviet/chat-quality-agent:latest
    container_name: cqa-app
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_DRIVER=sqlite
      - SQLITE_PATH=/var/lib/cqa/cqa.db
      - MESSAGE_DATA_DIR=/var/lib/cqa/messages
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - cqa_data:/var/lib/cqa
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: cqa-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
      - DOCKER_API_VERSION=1.40

volumes:
  cqa_data:
