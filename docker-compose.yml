version: "3.8"

services:
  app:
    build: .
    container_name: cqa-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_DRIVER=sqlite
      - SQLITE_PATH=/var/lib/cqa/cqa.db
      - MESSAGE_DATA_DIR=/var/lib/cqa/messages
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - cqa_data:/var/lib/cqa
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  cqa_data:
